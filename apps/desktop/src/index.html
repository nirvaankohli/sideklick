<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'"
    />
    <title>Big Red Hacks Overlay</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./lucide.min.js"></script>
  </head>
  <body>
    <main class="window-shell" data-mode="expanded" data-tone="light">
      <section class="overlay-card session-card">
        <div class="glow glow-one" aria-hidden="true"></div>
        <div class="glow glow-two" aria-hidden="true"></div>
        <header class="topbar">
          <div class="title-group session-title-group">
            <div class="session-title-row">
              <span class="home-title-icon session-logo-icon" aria-hidden="true">
                <img class="app-logo-image" src="../assets/images/logo/logo.png" alt="" />
              </span>
              <div>
                <p class="eyebrow" id="session-class-label">Active Class</p>
                <h1 id="session-name-label">Session</h1>
              </div>
            </div>
          </div>
          <div class="window-actions no-drag">
            <button id="shrink-window" class="icon-button" type="button" aria-label="Pin overlay">
              <i class="icon-svg" data-lucide="pin"></i>
            </button>
            <button id="stop-session" class="icon-button danger stop-session-button" type="button" aria-label="Stop Session">
              <i class="icon-svg" data-lucide="square"></i>
            </button>
            <button id="close-window" class="icon-button danger" type="button" aria-label="Close window">
              <i class="icon-svg" data-lucide="x"></i>
            </button>
          </div>
        </header>

        <section class="content">
          <section class="session-layout no-drag">
            <section class="chat-shell session-chat-shell">
              <div id="chat-thread" class="chat-thread">
              </div>
              <form id="chat-form" class="chat-compose">
                <textarea id="chat-input" rows="1" placeholder="Ask about this class, unit, or session..."></textarea>
                <div class="chat-compose-footer">
                  <div class="chat-attach-shell">
                    <button
                      id="chat-attach-trigger"
                      class="chat-attach-trigger"
                      type="button"
                      aria-label="Open attachment menu"
                      aria-haspopup="menu"
                      aria-expanded="false"
                    >
                      <i class="icon-svg chat-attach-icon" data-lucide="plus"></i>
                    </button>
                    <div id="chat-attach-menu" class="chat-attach-menu" hidden>
                      <button id="attach-screenshot-button" class="chat-attach-menu-item" type="button">Attach Screenshot</button>
                      <button id="attach-clipboard-button" class="chat-attach-menu-item" type="button">Attach Clipboard</button>
                    </div>
                  </div>
                  <button
                    id="send-message"
                    class="continue-button send-message-button"
                    type="submit"
                    aria-label="Send message"
                  >
                    <i class="icon-svg send-message-icon" data-lucide="arrow-up"></i>
                  </button>
                </div>
              </form>
            </section>
          </section>
        </section>

        <section class="compact-strip">
          <span class="compact-brand" aria-hidden="true">
            <img class="app-logo-image compact-logo-image" src="../assets/images/logo/logo.png" alt="" />
          </span>
          <button id="restore-window" class="restore-button compact-ask-star-button no-drag" type="button" aria-label="Expand overlay and open">
            Open
          </button>
          <button id="compact-close-window" class="icon-button danger compact-close-button no-drag" type="button" aria-label="Close window">
            <i class="icon-svg" data-lucide="x"></i>
          </button>
        </section>
        <button id="resize-handle" class="resize-handle no-drag" type="button" aria-label="Resize window"></button>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
