<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SideClick Home</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="window-shell home-shell" data-mode="expanded" data-tone="light">
      <section class="overlay-card home-card">
        <div class="glow glow-one" aria-hidden="true"></div>
        <div class="glow glow-two" aria-hidden="true"></div>

        <header class="topbar">
          <div class="title-group home-title-group">
            <div class="home-title-row">
              <span class="home-title-icon" aria-hidden="true">
                <svg class="icon-svg" viewBox="0 0 24 24">
                  <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path>
                </svg>
              </span>
              <div>
                <p class="eyebrow">Dashboard</p>
                <h1>Home</h1>
              </div>
            </div>
          </div>
          <div class="window-actions no-drag">
            <button id="shrink-window" class="icon-button" type="button" aria-label="Pin home window">
              <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7 6h10v2H7zM7 11h10v2H7zM7 16h10v2H7z"></path>
              </svg>
            </button>
            <button id="theme-icon-toggle" class="icon-button" type="button" aria-label="Toggle light or dark theme">
              <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12.2 3.2c.5 0 .8.4.8.8 0 .2 0 .4-.1.5-1 1.8-1.3 4-.7 6.1 1 3.2 4 5.4 7.4 5.4.4 0 .8.3.8.8 0 .2-.1.4-.2.5-1.7 2.3-4.4 3.7-7.3 3.7-5 0-9-4-9-9 0-4 2.7-7.4 6.5-8.6.1-.1.3-.2.5-.2Z"></path>
              </svg>
            </button>
            <button id="minimize-native" class="icon-button" type="button" aria-label="Minimize window">
              <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 19h12v-2H6z"></path>
              </svg>
            </button>
            <button id="close-window" class="icon-button danger" type="button" aria-label="Close window">
              <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18.3 7.11 16.89 5.7 12 10.59 7.11 5.7 5.7 7.11 10.59 12 5.7 16.89 7.11 18.3 12 13.41l4.89 4.89 1.41-1.41L13.41 12z"></path>
              </svg>
            </button>
          </div>
        </header>

        <section class="content">
          <div class="home-workspace no-drag">
            <section class="home-browser">
              <div class="home-browser-header">
                <div>
                  <p class="panel-label">Classes</p>
                  <div id="breadcrumbs" class="breadcrumbs"></div>
                </div>
                <div class="home-browser-actions">
                  <button id="back-folder" class="ghost-button" type="button">Back</button>
                  <button id="new-folder" class="ghost-button" type="button">Create Class</button>
                </div>
              </div>

              <div class="folder-create-row">
                <label class="search-input-shell" for="folder-name-input">
                  <span class="search-input-icon" aria-hidden="true">
                    <svg class="icon-svg" viewBox="0 0 24 24">
                      <path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79L19 20.49 20.49 19 15.5 14Zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14Z"></path>
                    </svg>
                  </span>
                  <input id="folder-name-input" class="folder-name-input" type="text" placeholder="Search classes" />
                </label>
                <button id="create-folder" class="continue-button create-folder-button" type="button">Create Class</button>
              </div>

              <div id="folder-grid" class="folder-grid"></div>
              <div id="empty-state" class="empty-state" hidden>
                <p id="empty-title" class="empty-title">No classes here yet.</p>
                <p id="empty-copy" class="empty-copy">Create a class folder to start organizing courses, notes, and study context.</p>
              </div>
            </section>
          </div>
        </section>

        <section class="compact-strip no-drag">
          <div class="compact-copy">
            <p class="compact-title">Pinned</p>
          </div>
          <div class="compact-actions">
            <button id="restore-window" class="restore-button" type="button" aria-label="Expand home">
              <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 8h8v2h-4v4h-2V8zm8 8H8v-2h4v-4h2v6z"></path>
              </svg>
            </button>
            <button id="compact-close-window" class="icon-button danger" type="button" aria-label="Close window">
              <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18.3 7.11 16.89 5.7 12 10.59 7.11 5.7 5.7 7.11 10.59 12 5.7 16.89 7.11 18.3 12 13.41l4.89 4.89 1.41-1.41L13.41 12z"></path>
              </svg>
            </button>
          </div>
        </section>
        <button id="resize-handle" class="resize-handle no-drag" type="button" aria-label="Resize window"></button>

        <div id="class-modal-backdrop" class="modal-backdrop no-drag" hidden>
          <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="class-modal-title">
            <div class="modal-header">
              <div>
                <p class="panel-label" id="class-modal-kicker">New class</p>
                <h2 id="class-modal-title" class="modal-title">Create Class</h2>
              </div>
              <button id="close-class-modal" class="icon-button" type="button" aria-label="Close modal">
                <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M18.3 7.11 16.89 5.7 12 10.59 7.11 5.7 5.7 7.11 10.59 12 5.7 16.89 7.11 18.3 12 13.41l4.89 4.89 1.41-1.41L13.41 12z"></path>
                </svg>
              </button>
            </div>

            <div id="class-fields" class="modal-form">
              <label class="modal-field">
                <span>Course</span>
                <input id="class-course-input" type="text" placeholder="AP Biology" />
              </label>
              <label class="modal-field">
                <span>Teacher Name</span>
                <input id="class-teacher-input" type="text" placeholder="Ms. Rivera" />
              </label>
              <label class="modal-field">
                <span>Description</span>
                <textarea id="class-description-input" rows="3" placeholder="What this class is about"></textarea>
              </label>
              <label class="modal-field">
                <span>Teacher Notes</span>
                <textarea id="class-teacher-notes-input" rows="3" placeholder="Teacher focus areas or reminders"></textarea>
              </label>
              <label class="modal-field">
                <span>Additional Notes</span>
                <textarea id="class-additional-notes-input" rows="3" placeholder="Anything else you want saved"></textarea>
              </label>
            </div>

            <div id="session-fields" class="modal-form" hidden>
              <label class="modal-field">
                <span>Session Name</span>
                <input id="session-name-input" type="text" placeholder="Unit 3 Review" />
              </label>
              <label class="modal-field">
                <span>Additional Notes</span>
                <textarea id="session-notes-input" rows="3" placeholder="Short notes for this session"></textarea>
              </label>
            </div>

            <div class="modal-actions">
              <button id="cancel-class-modal" class="ghost-button" type="button">Cancel</button>
              <button id="save-class-modal" class="continue-button" type="button">Save</button>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="./home.js"></script>
  </body>
</html>
